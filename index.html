<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

input, button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.actions{
display:flex;
flex-wrap:wrap;
gap:5px;
margin-top:10px;
}

.actions button{
width:auto;
padding:6px 10px;
font-size:12px;
}

.small{
font-size:12px;
color:#aaa;
}

.searchBox{
margin-top:10px;
}
</style>
</head>

<body>

<header>💰 Borç Takip</header>

<div class="container">

<h3>Yeni Müşteri</h3>

<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon">
<button onclick="addCustomer()">Müşteri Ekle</button>

<h3>🔍 Ara</h3>
<input id="search" class="searchBox" placeholder="Müşteri ara..." oninput="render()">

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers")) || [];

function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

function addCustomer(){
const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();

if(!name){
alert("İsim gir");
return;
}

customers.push({
id: Date.now(),
name,
phone,
debt: 0
});

document.getElementById("name").value = "";
document.getElementById("phone").value = "";

save();
}

function addDebt(id){
const amount = prompt("Borç miktarı:");
if(!amount) return;

const c = customers.find(x => x.id === id);
c.debt = (c.debt || 0) + Number(amount);

save();
}

function payDebt(id){
const amount = prompt("Ödeme miktarı:");
if(!amount) return;

const c = customers.find(x => x.id === id);
c.debt = (c.debt || 0) - Number(amount);

save();
}

function deleteCustomer(id){
customers = customers.filter(x => x.id !== id);
save();
}

function getFiltered(){
const q = document.getElementById("search").value.toLowerCase();
return customers.filter(c =>
(c.name || "").toLowerCase().includes(q)
);
}

/* ===================== */
/*        PDF            */
/* ===================== */
function downloadPDF(id){
const { jsPDF } = window.jspdf;
const c = customers.find(x => x.id === id);

if(!c){
alert("Müşteri bulunamadı");
return;
}

const doc = new jsPDF();

doc.setFont("helvetica","bold");
doc.setFontSize(16);
doc.text("BORÇ RAPORU", 20, 20);

doc.setFont("helvetica","normal");
doc.setFontSize(12);

doc.text("İsim: " + (c.name || "-"), 20, 40);
doc.text("Telefon: " + (c.phone || "-"), 20, 50);
doc.text("Toplam Borç: " + (c.debt || 0) + " TL", 20, 60);

doc.save((c.name || "musteri") + "_borc.pdf");
}

function render(){
const list = document.getElementById("list");
list.innerHTML = "";

const filtered = getFiltered();

if(filtered.length === 0){
list.innerHTML = "<p>Sonuç yok</p>";
return;
}

filtered.forEach(c => {

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<b>${c.name || "-"}</b><br>
<span class="small">${c.phone || ""}</span><br>
<b>Toplam Borç: ${c.debt || 0} ₺</b>

<div class="actions">
<button onclick="addDebt(${c.id})">+ Borç</button>
<button onclick="payDebt(${c.id})">Ödeme</button>
<button onclick="downloadPDF(${c.id})">📄 PDF</button>
<button onclick="deleteCustomer(${c.id})">Sil</button>
</div>
`;

list.appendChild(div);

});
}

render();
</script>

</body>
</html>
