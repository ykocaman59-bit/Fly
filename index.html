<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{ padding:15px; }

input, button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.small{
font-size:12px;
color:#aaa;
}

/* POPUP */
.popup{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

.popup-content{
background:#1e1e1e;
padding:15px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.actions button{
width:auto;
margin:5px 5px 0 0;
padding:6px 10px;
font-size:12px;
}

.history{
background:#111;
padding:6px;
margin-top:5px;
border-radius:6px;
font-size:12px;
}

/* SİL BUTONU */
.deleteBtn{
background:#e74c3c !important;
}
</style>
</head>

<body>

<header>💰 Borç Takip</header>

<div class="container">

<h3>Yeni Müşteri</h3>
<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon">
<button onclick="addCustomer()">Ekle</button>

<h3>🔍 Ara</h3>
<input id="search" oninput="render()" placeholder="Ara...">

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<h2 id="pName"></h2>
<p id="pPhone"></p>
<p><b id="pDebt"></b></p>

<div class="actions">
<button onclick="addDebtPopup()">+ Borç</button>
<button onclick="payDebtPopup()">Ödeme</button>
<button onclick="downloadPDFPopup()">📄 PDF</button>
<button class="deleteBtn" onclick="deleteCustomerPopup()">🗑 Sil</button>
<button onclick="closePopup()">Kapat</button>
</div>

<h3>İşlem Geçmişi</h3>
<div id="history"></div>

</div>
</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let currentId = null;

function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

function addCustomer(){
const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();

if(!name) return;

customers.push({
id:Date.now(),
name,
phone,
debt:0,
history:[]
});

save();
}

function addHistory(c,text){
c.history.push({
text,
date:new Date().toLocaleString()
});
}

function getFiltered(){
const q=document.getElementById("search").value.toLowerCase();
return customers.filter(c=>
(c.name||"").toLowerCase().includes(q)
);
}

/* ========== POPUP ========== */
function openPopup(id){
currentId=id;
const c=customers.find(x=>x.id===id);

document.getElementById("popup").style.display="block";
document.getElementById("pName").innerText=c.name;
document.getElementById("pPhone").innerText=c.phone||"";
document.getElementById("pDebt").innerText="Toplam Borç: "+c.debt+" ₺";

renderHistory(c);
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* ========== HISTORY ========== */
function renderHistory(c){
let html="";
(c.history||[]).slice().reverse().forEach(h=>{
html+=`<div class="history">🕒 ${h.date}<br>${h.text}</div>`;
});
document.getElementById("history").innerHTML=html || "Kayıt yok";
}

/* ========== BORÇ / ÖDEME ========== */
function addDebtPopup(){
const amount=prompt("Borç:");
if(!amount) return;

const c=customers.find(x=>x.id===currentId);
c.debt+=Number(amount);
addHistory(c,"+ "+amount+"₺ borç eklendi");
save();
openPopup(currentId);
}

function payDebtPopup(){
const amount=prompt("Ödeme:");
if(!amount) return;

const c=customers.find(x=>x.id===currentId);
c.debt-=Number(amount);
addHistory(c,"- "+amount+"₺ ödeme alındı");
save();
openPopup(currentId);
}

/* ========== SİLME (ONAYLI) ========== */
function deleteCustomerPopup(){

const confirmDelete = confirm("Müşteriyi silmek istediğinize emin misiniz?");

if(!confirmDelete){
return; // iptal
}

customers = customers.filter(x => x.id !== currentId);
save();
closePopup();
}

/* ========== PDF ========== */
function downloadPDFPopup(){
const { jsPDF } = window.jspdf;
const c=customers.find(x=>x.id===currentId);

const doc=new jsPDF();
doc.text("BORÇ RAPORU",20,20);
doc.text("İsim: "+c.name,20,40);
doc.text("Borç: "+c.debt+" TL",20,50);
doc.save(c.name+".pdf");
}

/* ========== RENDER ========== */
function render(){
const list=document.getElementById("list");
list.innerHTML="";

const filtered=getFiltered();

filtered.forEach(c=>{
const div=document.createElement("div");
div.className="card";
div.onclick=()=>openPopup(c.id);

div.innerHTML=`
<b>${c.name}</b><br>
<span class="small">${c.phone||""}</span><br>
<b>${c.debt} ₺</b>
`;

list.appendChild(div);
});
}

render();
</script>

</body>
</html>
