<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip</title>

<style>
body{
font-family:Arial;
margin:0;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
padding:15px;
}

input, button{
padding:10px;
margin:5px 0;
width:100%;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.customer{
border-bottom:1px solid #333;
padding:10px 0;
}

.small{
font-size:12px;
color:#aaa;
}

.actions button{
width:auto;
margin-right:5px;
padding:5px 10px;
font-size:12px;
}
</style>
</head>

<body>

<header>💰 Borç Takip Uygulaması</header>

<div class="container">

<h3>Yeni Müşteri</h3>

<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon (opsiyonel)">
<button onclick="addCustomer()">Müşteri Ekle</button>

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<script>
let customers = JSON.parse(localStorage.getItem("customers")) || [];

function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

function addCustomer(){
const name = document.getElementById("name").value;
const phone = document.getElementById("phone").value;

if(!name){
alert("İsim gir");
return;
}

customers.push({
id: Date.now(),
name,
phone,
debt: 0
});

document.getElementById("name").value = "";
document.getElementById("phone").value = "";

save();
}

function addDebt(id){
const amount = prompt("Borç miktarı gir:");
if(!amount) return;

const customer = customers.find(c => c.id === id);
customer.debt += Number(amount);

save();
}

function payDebt(id){
const amount = prompt("Ödeme miktarı gir:");
if(!amount) return;

const customer = customers.find(c => c.id === id);
customer.debt -= Number(amount);

save();
}

function deleteCustomer(id){
customers = customers.filter(c => c.id !== id);
save();
}

function render(){
const list = document.getElementById("list");
list.innerHTML = "";

customers.forEach(c => {

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div class="customer">
<b>${c.name}</b><br>
<span class="small">${c.phone || ""}</span><br>
<b>Toplam Borç: ${c.debt} ₺</b>
</div>

<div class="actions">
<button onclick="addDebt(${c.id})">+ Borç</button>
<button onclick="payDebt(${c.id})">Ödeme</button>
<button onclick="deleteCustomer(${c.id})">Sil</button>
</div>
`;

list.appendChild(div);

});
}

render();
</script>

</body>
</html>
