<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip</title>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{ padding:15px; }

input, button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.small{
font-size:12px;
color:#aaa;
}

.popup{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

.popup-content{
background:#1e1e1e;
padding:15px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}
</style>
</head>

<body>

<header>💰 Borç Takip</header>

<div class="container">

<h3>Yeni Müşteri</h3>
<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon">
<button onclick="addCustomer()">Ekle</button>

<h3>Arama</h3>
<input id="search" oninput="render()" placeholder="Ara...">

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<h2 id="pName"></h2>
<p id="pPhone"></p>
<p><b id="pDebt"></b></p>

<button onclick="addDebtPopup()">+ Borç</button>
<button onclick="payDebtPopup()">Ödeme</button>
<button onclick="closePopup()">Kapat</button>

</div>
</div>

<script>

let customers = JSON.parse(localStorage.getItem("customers")) || [];
let currentId = null;

/* SAVE */
function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

/* ADD CUSTOMER */
function addCustomer(){
const name = document.getElementById("name").value.trim();
const phone = document.getElementById("phone").value.trim();

if(!name) return;

customers.push({
id:Date.now(),
name,
phone,
debt:0
});

document.getElementById("name").value="";
document.getElementById("phone").value="";

save();
}

/* FILTER */
function getFiltered(){
const q = document.getElementById("search").value.toLowerCase();
return customers.filter(c =>
(c.name||"").toLowerCase().includes(q)
);
}

/* OPEN POPUP */
function openPopup(id){
currentId = id;
const c = customers.find(x=>x.id===id);

document.getElementById("popup").style.display="block";
document.getElementById("pName").innerText = c.name;
document.getElementById("pPhone").innerText = c.phone || "";
document.getElementById("pDebt").innerText = "Borç: " + c.debt + " ₺";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* ✅ BORÇ EKLE (DÜZELTİLMİŞ) */
function addDebtPopup(){
const a = prompt("Borç miktarı (sadece sayı):");

if(a === null) return;

if(isNaN(a) || a.trim() === ""){
alert("Lütfen sadece sayı gir!");
return;
}

const c = customers.find(x=>x.id===currentId);
c.debt += parseFloat(a);

save();
openPopup(currentId);
}

/* ✅ ÖDEME (DÜZELTİLMİŞ) */
function payDebtPopup(){
const a = prompt("Ödeme miktarı (sadece sayı):");

if(a === null) return;

if(isNaN(a) || a.trim() === ""){
alert("Lütfen sadece sayı gir!");
return;
}

const c = customers.find(x=>x.id===currentId);
c.debt -= parseFloat(a);

save();
openPopup(currentId);
}

/* RENDER */
function render(){
const list = document.getElementById("list");
list.innerHTML="";

getFiltered().forEach(c=>{
const div = document.createElement("div");
div.className="card";
div.onclick = ()=>openPopup(c.id);

div.innerHTML = `
<b>${c.name}</b><br>
<span class="small">${c.phone||""}</span><br>
<b>${c.debt} ₺</b>
`;

list.appendChild(div);
});
}

render();

</script>

</body>
</html>
