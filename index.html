<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{ padding:15px; }

input, button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.small{ font-size:12px; color:#aaa; }

.popup{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

.popup-content{
background:#1e1e1e;
padding:15px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.deleteModal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.deleteBox{
background:#2c2c2c;
padding:20px;
border-radius:12px;
text-align:center;
border:2px solid #e74c3c;
}

.history{
background:#111;
padding:6px;
margin-top:5px;
border-radius:6px;
font-size:12px;
}

/* CUSTOM INPUT */
#inputModal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
}

#inputModal div{
background:#1e1e1e;
padding:20px;
border-radius:12px;
width:80%;
max-width:300px;
}

/* ALERT */
#alertBox{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
}

#alertBox div{
background:#1e1e1e;
padding:20px;
border-radius:12px;
text-align:center;
width:80%;
max-width:300px;
border:2px solid #1DB954;
}
</style>
</head>

<body>

<header>💰 Borç Takip PRO</header>

<div class="container">

<h3>Yeni Müşteri</h3>
<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon (sadece rakam)">
<button onclick="addCustomer()">Ekle</button>

<h3>Arama</h3>
<input id="search" oninput="render()" placeholder="Ara...">

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<h2 id="pName"></h2>
<p id="pPhone"></p>
<p><b id="pDebt"></b></p>

<button onclick="addDebtPopup()">+ Borç</button>
<button onclick="payDebtPopup()">Ödeme</button>
<button onclick="downloadPDFPopup()">PDF</button>
<button onclick="openDeleteModal()">Sil</button>
<button onclick="openEditModal()">Düzenle</button>
<button onclick="closePopup()">Kapat</button>

<h3>Geçmiş</h3>
<div id="history"></div>

</div>
</div>

<!-- DELETE -->
<div class="deleteModal" id="deleteModal">
<div class="deleteBox">
<h3>Silinsin mi?</h3>
<button onclick="confirmDelete()">Evet</button>
<button onclick="closeDeleteModal()">İptal</button>
</div>
</div>

<!-- INPUT -->
<div id="inputModal">
<div>
<h3 id="inputTitle">İşlem</h3>
<input id="numberInput" type="number">
<button onclick="confirmInput()">Tamam</button>
<button onclick="closeInput()" style="background:#555;">İptal</button>
</div>
</div>

<!-- ALERT -->
<div id="alertBox">
<div>
<p id="alertText">Uyarı</p>
<button onclick="closeAlert()">Tamam</button>
</div>
</div>

<script>

let customers = JSON.parse(localStorage.getItem("customers")) || [];
let currentId = null;

/* SAVE */
function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

/* ALERT SYSTEM */
function showAlert(msg){
document.getElementById("alertText").innerText = msg;
document.getElementById("alertBox").style.display = "flex";
}

function closeAlert(){
document.getElementById("alertBox").style.display = "none";
}

/* ADD CUSTOMER (FULL FIX) */
function addCustomer(){
const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.trim();

if(!name || !phone){
showAlert("Lütfen bilgileri doldurunuz");
return;
}

/* 🔥 SADECE SAYI */
if(!/^[0-9]+$/.test(phone)){
showAlert("Telefon sadece rakam olmalıdır");
return;
}

customers.push({
id:Date.now(),
name,
phone,
debt:0,
history:[]
});

document.getElementById("name").value="";
document.getElementById("phone").value="";

save();
}

/* OPEN POPUP */
function openPopup(id){
currentId=id;
const c=customers.find(x=>x.id===id);

document.getElementById("popup").style.display="block";
document.getElementById("pName").innerText=c.name;
document.getElementById("pPhone").innerText=c.phone;
document.getElementById("pDebt").innerText="Borç: "+c.debt+" ₺";

renderHistory(c);
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* HISTORY */
function renderHistory(c){
let html="";
(c.history||[]).slice().reverse().forEach(h=>{
html+=`<div class="history">🕒 ${h.date}<br>${h.text}</div>`;
});
document.getElementById("history").innerHTML=html || "Yok";
}

/* INPUT SYSTEM */
let inputCallback=null;

function openInput(title,callback){
document.getElementById("inputModal").style.display="flex";
document.getElementById("inputTitle").innerText=title;
document.getElementById("numberInput").value="";
inputCallback=callback;
}

function closeInput(){
document.getElementById("inputModal").style.display="none";
inputCallback=null;
}

function confirmInput(){
const val=document.getElementById("numberInput").value;

if(val==="" || isNaN(val)){
showAlert("Sadece sayı gir!");
return;
}

inputCallback(Number(val));
closeInput();
}

/* BORÇ */
function addDebtPopup(){
openInput("Borç Ekle",function(val){
const c=customers.find(x=>x.id===currentId);
c.debt+=val;
c.history.push({text:"+ "+val+"₺ borç",date:new Date().toLocaleString()});
save();
openPopup(currentId);
});
}

/* ÖDEME */
function payDebtPopup(){
openInput("Ödeme",function(val){
const c=customers.find(x=>x.id===currentId);
c.debt-=val;
c.history.push({text:"- "+val+"₺ ödeme",date:new Date().toLocaleString()});
save();
openPopup(currentId);
});
}

/* DELETE */
function openDeleteModal(){
document.getElementById("deleteModal").style.display="flex";
}

function closeDeleteModal(){
document.getElementById("deleteModal").style.display="none";
}

function confirmDelete(){
customers=customers.filter(x=>x.id!==currentId);
save();
closeDeleteModal();
closePopup();
}

/* EDIT */
function openEditModal(){
const c=customers.find(x=>x.id===currentId);

const name=prompt("Yeni isim:",c.name);
const phone=prompt("Yeni telefon:",c.phone);

/* validation */
if(!name || !phone){
showAlert("Boş bırakılamaz");
return;
}

if(!/^[0-9]+$/.test(phone)){
showAlert("Telefon sadece rakam olmalı");
return;
}

c.name=name;
c.phone=phone;

save();
openPopup(currentId);
}

/* PDF */
function downloadPDFPopup(){
const { jsPDF } = window.jspdf;
const c=customers.find(x=>x.id===currentId);

const doc=new jsPDF();
doc.text("BORÇ RAPORU",20,20);
doc.text("İsim: "+c.name,20,40);
doc.text("Telefon: "+c.phone,20,50);
doc.text("Borç: "+c.debt,20,60);
doc.save(c.name+".pdf");
}

/* RENDER */
function render(){
const list=document.getElementById("list");
list.innerHTML="";

customers.forEach(c=>{
const div=document.createElement("div");
div.className="card";
div.onclick=()=>openPopup(c.id);

div.innerHTML=`
<b>${c.name}</b><br>
<span class="small">${c.phone}</span><br>
<b>${c.debt} ₺</b>
`;

list.appendChild(div);
});
}

render();

</script>

</body>
</html>
