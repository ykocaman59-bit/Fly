<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borç Takip PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#121212;
color:white;
}

header{
background:#1DB954;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{ padding:15px; }

input, button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
font-size:14px;
}

button{
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:#1e1e1e;
padding:10px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
}

.small{ font-size:12px; color:#aaa; }

.popup{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
padding:20px;
}

.popup-content{
background:#1e1e1e;
padding:15px;
border-radius:10px;
max-height:90vh;
overflow:auto;
}

.deleteModal, #editModal{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.deleteBox{
background:#2c2c2c;
padding:20px;
border-radius:12px;
text-align:center;
border:2px solid #e74c3c;
}

#editModal div{
background:#1e1e1e;
padding:20px;
border-radius:12px;
width:80%;
max-width:300px;
text-align:center;
border:2px solid #1DB954;
}

#inputModal, #alertBox{
display:none;
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
}

#inputModal div, #alertBox div{
background:#1e1e1e;
padding:20px;
border-radius:12px;
width:80%;
max-width:300px;
text-align:center;
border:2px solid #1DB954;
}
</style>
</head>

<body>

<header>💰 Borç Takip PRO</header>

<div class="container">

<h3>Yeni Müşteri</h3>

<input id="name" placeholder="Müşteri adı">
<input id="phone" placeholder="Telefon" maxlength="10" oninput="formatPhone(this)">
<button onclick="addCustomer()">Ekle</button>

<h3>Arama</h3>
<input id="search" oninput="render()" placeholder="Müşteri ara...">

<h3>Müşteriler</h3>
<div id="list"></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">

<h2 id="pName"></h2>
<p id="pPhone"></p>
<p><b id="pDebt"></b></p>

<button onclick="addDebtPopup()">+ Borç</button>
<button onclick="payDebtPopup()">Ödeme</button>
<button onclick="downloadPDFPopup()">PDF</button>
<button onclick="openDeleteModal()">Sil</button>
<button onclick="openEditModal()">Düzenle</button>
<button onclick="openWhatsApp()">WhatsApp</button>
<button onclick="closePopup()">Kapat</button>

<h3>Geçmiş</h3>
<div id="history"></div>

</div>
</div>

<!-- DELETE MODAL -->
<div class="deleteModal" id="deleteModal">
<div class="deleteBox">
<h3>Silmek istediğinize emin misiniz?</h3>
<button onclick="confirmDelete()">Evet</button>
<button onclick="closeDeleteModal()">İptal</button>
</div>
</div>

<!-- EDIT MODAL -->
<div id="editModal">
<div>
<h3>Düzenle</h3>

<input id="editName" placeholder="İsim">
<input id="editPhone" placeholder="Telefon" maxlength="10" oninput="formatPhone(this)">

<br><br>

<button onclick="saveEdit()">Kaydet</button>
<button onclick="closeEditModal()" style="background:#555;">İptal</button>
</div>
</div>

<!-- INPUT -->
<div id="inputModal">
<div>
<h3 id="inputTitle"></h3>
<input id="numberInput" type="number">
<button onclick="confirmInput()">Tamam</button>
<button onclick="closeInput()" style="background:#555;">İptal</button>
</div>
</div>

<!-- ALERT -->
<div id="alertBox">
<div>
<p id="alertText"></p>
<button onclick="closeAlert()">Tamam</button>
</div>
</div>

<script>

let customers = JSON.parse(localStorage.getItem("customers")) || [];
let currentId=null;

function save(){
localStorage.setItem("customers", JSON.stringify(customers));
render();
}

function showAlert(msg){
document.getElementById("alertText").innerText=msg;
document.getElementById("alertBox").style.display="flex";
}

function closeAlert(){
document.getElementById("alertBox").style.display="none";
}

function formatPhone(input){
let v=input.value.replace(/\D/g,"");
if(v.length>10) v=v.slice(0,10);
input.value=v;
}

/* ADD */
function addCustomer(){
const name=document.getElementById("name").value.trim();
const phone=document.getElementById("phone").value.replace(/\D/g,"");

if(!name||!phone){
showAlert("Lütfen bilgileri doldurunuz");
return;
}

if(customers.some(c=>c.phone===phone)){
showAlert("Bu numara zaten kayıtlı");
return;
}

customers.push({
id:Date.now(),
name,
phone,
debt:0,
history:[]
});

document.getElementById("name").value="";
document.getElementById("phone").value="";

save();
}

/* SEARCH */
function render(){
const q=document.getElementById("search").value.toLowerCase();
const list=document.getElementById("list");
list.innerHTML="";

customers
.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q))
.forEach(c=>{

const div=document.createElement("div");
div.className="card";
div.innerHTML=`
<b>${c.name}</b><br>
<span class="small">+90 ${c.phone}</span><br>
<b>${c.debt} ₺</b>
`;

div.onclick=()=>openPopup(c.id);

list.appendChild(div);
});
}

/* POPUP */
function openPopup(id){
currentId=id;
const c=customers.find(x=>x.id===id);

document.getElementById("popup").style.display="block";
document.getElementById("pName").innerText=c.name;
document.getElementById("pPhone").innerText="+90 "+c.phone;
document.getElementById("pDebt").innerText="Borç: "+c.debt+" ₺";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* DELETE */
function openDeleteModal(){
document.getElementById("deleteModal").style.display="flex";
}

function closeDeleteModal(){
document.getElementById("deleteModal").style.display="none";
}

function confirmDelete(){
customers=customers.filter(x=>x.id!==currentId);
save();
closePopup();
closeDeleteModal();
}

/* EDIT */
function openEditModal(){
const c=customers.find(x=>x.id===currentId);

document.getElementById("editName").value=c.name;
document.getElementById("editPhone").value=c.phone;

document.getElementById("editModal").style.display="flex";
}

function closeEditModal(){
document.getElementById("editModal").style.display="none";
}

function saveEdit(){
const c=customers.find(x=>x.id===currentId);

const name=document.getElementById("editName").value.trim();
const phone=document.getElementById("editPhone").value.replace(/\D/g,"");

if(!name||!phone){
showAlert("Eksik bilgi");
return;
}

c.name=name;
c.phone=phone;

save();
closeEditModal();
}

/* WHATSAPP */
function openWhatsApp(){
const c=customers.find(x=>x.id===currentId);
window.open(`https://wa.me/90${c.phone}`,"_blank");
}

/* BORÇ */
function addDebtPopup(){
const c=customers.find(x=>x.id===currentId);
let v=prompt("Borç:");
c.debt+=Number(v||0);
save();
}

/* ÖDEME */
function payDebtPopup(){
const c=customers.find(x=>x.id===currentId);
let v=prompt("Ödeme:");
c.debt-=Number(v||0);
save();
}

/* PDF */
function downloadPDFPopup(){
const {jsPDF}=window.jspdf;
const c=customers.find(x=>x.id===currentId);

const doc=new jsPDF();
doc.text(c.name,20,20);
doc.text("+90 "+c.phone,20,30);
doc.text("Borç: "+c.debt,20,40);
doc.save("rapor.pdf");
}

render();

</script>

</body>
</html>
