<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly Müzik</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:#fff;
padding-bottom:120px;
}

header{
background:#1DB954;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
padding:15px;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search input{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
}

.search button{
padding:14px 20px;
border:none;
border-radius:10px;
background:#1DB954;
color:white;
font-weight:bold;
cursor:pointer;
}

.song{
display:flex;
align-items:center;
background:#1e1e1e;
border-radius:12px;
padding:10px;
margin-bottom:10px;
gap:12px;
}

.song img{
width:80px;
height:80px;
border-radius:10px;
object-fit:cover;
}

.info{
flex:1;
}

.title{
font-size:18px;
font-weight:bold;
}

.artist{
font-size:14px;
color:#aaa;
margin-top:4px;
}

.play{
background:#1DB954;
color:white;
border:none;
padding:10px 14px;
border-radius:8px;
cursor:pointer;
}

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#181818;
padding:15px;
border-top:1px solid #333;
}

#nowPlaying{
margin-bottom:8px;
font-size:14px;
}

audio{
width:100%;
}
</style>
</head>
<body>
<header>🎵 Fly Müzik</header>
<div class="container">
<div class="search">
<input id="searchInput" type="text" placeholder="Şarkı veya sanatçı ara">
<button onclick="searchMusic()">Ara</button>
</div>
<div id="results"></div>
</div>

<div class="player">
<div id="nowPlaying">Bir şarkı seç...</div>
<audio id="audioPlayer" controls></audio>
</div>

<script>
const resultsDiv = document.getElementById("results");
const player = document.getElementById("audioPlayer");
const nowPlaying = document.getElementById("nowPlaying");

// Dünyanın en popüler ve en stabil ücretsiz Invidious sunucularından biri
const host = "https://yewtu.be"; 

async function searchMusic(){
    const query = document.getElementById("searchInput").value.trim();

    if(!query){
        alert("Şarkı adı gir.");
        return;
    }

    resultsDiv.innerHTML = "YouTube'da aranıyor...";

    try {
        // YouTube verilerini çeken ücretsiz API endpoint'i
        const response = await fetch(`${host}/api/v1/search?q=${encodeURIComponent(query)}&type=video`);
        
        if (!response.ok) {
            throw new Error("Sunucu yanıt vermedi.");
        }

        const data = await response.json();
        resultsDiv.innerHTML = "";

        // Gelen verileri filtreleyip listeliyoruz
        if(!data || data.length === 0){
            resultsDiv.innerHTML = "Sonuç bulunamadı.";
            return;
        }

        data.forEach(video => {
            // Canlı yayınları listeye alıp oynatıcıyı bozmamak için eliyoruz
            if(video.liveNow) return;

            // YouTube video kapağını alıyoruz
            const cover = video.videoThumbnails && video.videoThumbnails[0] 
                ? video.videoThumbnails[0].url 
                : "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=150";

            const div = document.createElement("div");
            div.className = "song";
            div.innerHTML = `
                <img src="${cover}">
                <div class="info">
                    <div class="title">${video.title}</div>
                    <div class="artist">${video.author}</div>
                </div>
                <button class="play">Çal</button>
            `;

            div.querySelector(".play").onclick = async () => {
                // Videonun doğrudan ses akışını (audio stream) çeken URL yapısı
                const streamUrl = `${host}/latest_version?id=${video.videoId}&audio=true`;
                player.src = streamUrl;
                
                try {
                    nowPlaying.textContent = "Yükleniyor: " + video.title;
                    await player.play();
                    nowPlaying.textContent = video.author + " - " + video.title;
                } catch(pErr) {
                    alert("Bu şarkı şu an oynatılamadı, lütfen listedeki alternatif videoları deneyin.");
                }
            };

            resultsDiv.appendChild(div);
        });

    } catch(err) {
        console.error(err);
        resultsDiv.innerHTML = "HATA: Şu an istek sınırı aşıldı veya sunucu yoğun. Lütfen birkaç saniye sonra tekrar aratın.";
    }
}
</script>
</body>
</html>
