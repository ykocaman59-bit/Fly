<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>MYT Benzeri</title>
</head>
<body>

<h2>MYT Benzeri Müzik Arama</h2>

<input type="text" id="arama" placeholder="Şarkı veya sanatçı adı">
<button onclick="ara()">Ara</button>

<div id="sonuc"></div>

<script>
function ara() {
    let kelime = document.getElementById("arama").value;

    document.getElementById("sonuc").innerHTML =
        "Aranan: " + kelime;
}
</script>

</body>
</html>
